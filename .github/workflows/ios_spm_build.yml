name: iOS SPM build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios_clean_build:
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        flutter-version: [ 3.32.x, 3.35.x, 3.38.x, 3.41.x ]
    env:
      IPHONE_MODEL: "iPhone 17"

    steps:
      - name: Provide more disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'
          cache-key: ${{ matrix.flutter-version }}

      - name: Enable SPM
        run: flutter config --enable-swift-package-manager

      - name: Build example app
        run: |
          cd example
          flutter build ios --no-codesign

      - name: Create default project and add Adyen checkout plugin package
        run: |
          flutter pub get
          flutter create --template=app --platforms=android,ios demo_project
          cd demo_project
          dart pub add 'adyen_checkout:{"path":"../"}'

      - name: Build app for simulator
        working-directory: demo_project
        run: flutter build ios --debug --simulator

      - name: Install app on simulator
        working-directory: demo_project
        run: |
          DEVICE_ID=$(xcrun simctl list devices | awk -v model="$IPHONE_MODEL" '$0 ~ model && $0 ~ /\(Booted\)/ { if (match($0, /\(([0-9A-Fa-f-]+)\)/)) { print substr($0, RSTART + 1, RLENGTH - 2); exit } }')
          if [ -z "$DEVICE_ID" ]; then
            open -a Simulator
            xcrun simctl boot "$IPHONE_MODEL"
            xcrun simctl bootstatus "$IPHONE_MODEL" -b
            DEVICE_ID="$IPHONE_MODEL"
          fi
          xcrun simctl install "$DEVICE_ID" build/ios/iphonesimulator/Runner.app
          xcrun simctl launch "$DEVICE_ID" com.example.demoProject