name: Flutter unit tests

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version'
        required: false
        default: '3.41.x'
        type: string

jobs:
  flutter_tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2.22.0
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Setup LCOV
        run: sudo apt-get -y install lcov
        shell: bash

      - run: flutter pub get
      - run: flutter analyze
      - run: |
          flutter test --coverage 
          lcov --remove coverage/lcov.info 'lib/**/*.g.dart' -o ./coverage/coverage_with_exclusion.info 

      - name: Report code coverage
        uses: zgosalvez/github-actions-report-lcov@3df2a2c4b06b3c7a4ab97e8936f7a7d62712dad3 # v7.0.7
        with:
          coverage-files: coverage/coverage_with_exclusion.info
          artifact-name: flutter-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}