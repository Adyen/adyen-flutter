name: Flutter unit tests

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version'
        required: false
        default: '3.41.x'
        type: string

jobs:
  flutter_tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Setup LCOV
        run: sudo apt-get -y install lcov
        shell: bash

      - run: flutter pub get
      - run: flutter analyze
      - run: |
          flutter test --coverage 
          lcov --remove coverage/lcov.info 'lib/**/*.g.dart' -o ./coverage/coverage_with_exclusion.info 

      - name: Report code coverage
        uses: zgosalvez/github-actions-report-lcov@5aba2ff56b3dd258ec9916d3b5049dc5994db23e # v7.0.9
        with:
          coverage-files: coverage/coverage_with_exclusion.info
          artifact-name: flutter-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}