name: Flutter unit tests

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version'
        required: false
        default: '3.44.x'
        type: string

jobs:
  flutter_tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Setup LCOV
        run: sudo apt-get -y install lcov
        shell: bash

      - run: flutter pub get
      - run: flutter analyze
      - run: |
          flutter test --coverage 
          lcov --remove coverage/lcov.info 'lib/**/*.g.dart' -o ./coverage/coverage_with_exclusion.info 

      - name: Report code coverage
        uses: zgosalvez/github-actions-report-lcov@84f16a83ae03e846a4c697bd75cae3f94fa9f426 # v7.0.12
        with:
          coverage-files: coverage/coverage_with_exclusion.info
          artifact-name: flutter-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}