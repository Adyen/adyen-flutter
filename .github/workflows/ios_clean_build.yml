name: iOS clean build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios_clean_build:
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        flutter-version: [ 3.16.x, 3.19.x, 3.22.x, 3.24.x, 3.27.x, 3.29.x, 3.32.x, 3.35.x, 3.38.x, 3.41.x ]
    env:
      IPHONE_MODEL: "iPhone 17"

    steps:
      - name: Provide more disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'
          cache-key: ${{ matrix.flutter-version }}

      - run: flutter pub get

      - name: Create default project and add Adyen checkout plugin package
        run: |
          flutter create --template=app --platforms=android,ios demo_project
          cd demo_project
          dart pub add 'adyen_checkout:{"path":"../"}'

      - name: Build app for simulator
        working-directory: demo_project
        run: flutter build ios --debug --simulator

      - name: Install app on simulator
        working-directory: demo_project
        run: |
          xcrun simctl list devices
          TARGET_DEVICE_ID=$(xcrun simctl list devices available | awk -v model="$IPHONE_MODEL" 'index($0, "    " model " (") == 1 { if (match($0, /\(([0-9A-Fa-f-]+)\)/)) { device_id = substr($0, RSTART + 1, RLENGTH - 2) } } END { print device_id }')
          DEVICE_ID=$(xcrun simctl list devices | awk '/\(Booted\)/ { if (match($0, /\(([0-9A-Fa-f-]+)\)/)) { print substr($0, RSTART + 1, RLENGTH - 2); exit } }')
          if [ -z "$DEVICE_ID" ]; then
            xcrun simctl boot "$TARGET_DEVICE_ID"
            xcrun simctl bootstatus "$TARGET_DEVICE_ID" -b
            DEVICE_ID="$TARGET_DEVICE_ID"
          fi
          xcrun simctl install "$DEVICE_ID" build/ios/iphonesimulator/Runner.app
          xcrun simctl launch "$DEVICE_ID" com.example.demoProject